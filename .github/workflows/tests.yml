name: Tests Mínimos (TFG)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    
    - name: Configurar entorno Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Instalar dependencias para pruebas
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements-dev.txt
        
    - name: Ejecutar la batería de tests unitarios (pytest)
      env:
        PYTHONPATH: .
      run: |
        pytest tests/ -v
